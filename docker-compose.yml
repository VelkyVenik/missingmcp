services:
  gateway:
    build:
      context: .
      args:
        GARMIN_MCP_REF: ${GARMIN_MCP_REF:-2974244bfda1595b00836b3f942f579ec2d6f7d6}
    # No `init: true` — tini is the image ENTRYPOINT and runs as PID 1, where it
    # reaps the worker subprocesses. Adding compose's init too would push tini to
    # PID 7 (the "Tini is not running as PID 1" warning) and make it a no-op.
    restart: unless-stopped
    env_file: .env
    ports:
      - "127.0.0.1:8080:8080"        # nginx (host) proxies to this
    volumes:
      - gateway-data:/data

volumes:
  gateway-data:
